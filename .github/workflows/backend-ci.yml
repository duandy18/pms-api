name: Backend CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pms
          POSTGRES_PASSWORD: pms
          POSTGRES_DB: pms
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U pms -d pms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      PMS_DATABASE_URL: postgresql+psycopg://pms:pms@127.0.0.1:5433/pms
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -e ".[dev]"

      - name: Compile
        run: |
          .venv/bin/python3 -m compileall app tests scripts

      - name: Upgrade database
        run: |
          make upgrade-dev

      - name: Alembic check
        run: |
          make alembic-check

      - name: Test
        run: |
          make test

      - name: Lint
        run: |
          make lint

      - name: Print routes
        run: |
          make routes
