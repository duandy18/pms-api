name: Backend CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -e ".[dev]"

      - name: Compile
        run: |
          .venv/bin/python -m compileall app tests scripts

      - name: Test
        run: |
          make test

      - name: Lint
        run: |
          make lint

      - name: Print routes
        run: |
          make routes
